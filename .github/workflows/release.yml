# Builds and publishes gitle binaries whenever you push a version tag.
# To cut a release:  git tag v0.1.0 && git push --tags
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release and upload binaries

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for changelogs

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
